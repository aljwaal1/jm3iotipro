name: Build APK Direct

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
    paths-ignore:
      - "apk/**"
      - "DOWNLOAD_APK.md"

permissions:
  contents: write

jobs:
  build:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Create Android project files
        run: flutter create --platforms=android --org com.explapp --no-pub .

      - name: Remove generated sample tests
        run: rm -rf test

      - name: Get packages
        run: flutter pub get

      - name: Configure Android app (minSdk + applicationId)
        shell: bash
        run: |
          set -e
          if [ -f android/app/build.gradle.kts ]; then
            sed -i 's/applicationId = \".*\"/applicationId = \"com.explapp.jamiyati\"/g' android/app/build.gradle.kts
            sed -i 's/minSdk = flutter.minSdkVersion/minSdk = 23/g' android/app/build.gradle.kts
            sed -i 's/minSdk = [0-9][0-9]*/minSdk = 23/g' android/app/build.gradle.kts
          fi
          if [ -f android/app/build.gradle ]; then
            sed -i 's/applicationId \".*\"/applicationId \"com.explapp.jamiyati\"/g' android/app/build.gradle
            sed -i 's/minSdkVersion flutter.minSdkVersion/minSdkVersion 23/g' android/app/build.gradle
            sed -i 's/minSdkVersion [0-9][0-9]*/minSdkVersion 23/g' android/app/build.gradle
          fi

      - name: Write AndroidManifest (permissions for share + internet)
        shell: bash
        run: |
          cat > android/app/src/main/AndroidManifest.xml <<'MANIFEST'
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <uses-permission android:name="android.permission.INTERNET"/>
              <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE"/>
              <uses-permission android:name="android.permission.WRITE_EXTERNAL_STORAGE" android:maxSdkVersion="28"/>
              <queries>
                  <intent>
                      <action android:name="android.intent.action.VIEW" />
                      <data android:scheme="https" />
                  </intent>
                  <intent>
                      <action android:name="android.intent.action.SEND" />
                      <data android:mimeType="*/*" />
                  </intent>
              </queries>
              <application
                  android:label="جمعيتي"
                  android:name="${applicationName}"
                  android:icon="@mipmap/ic_launcher"
                  android:usesCleartextTraffic="false">
                  <activity
                      android:name=".MainActivity"
                      android:exported="true"
                      android:launchMode="singleTop"
                      android:taskAffinity=""
                      android:theme="@style/LaunchTheme"
                      android:configChanges="orientation|keyboardHidden|keyboard|screenSize|smallestScreenSize|locale|layoutDirection|fontScale|screenLayout|density|uiMode"
                      android:hardwareAccelerated="true"
                      android:windowSoftInputMode="adjustResize">
                      <meta-data android:name="io.flutter.embedding.android.NormalTheme" android:resource="@style/NormalTheme" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                  </activity>
                  <meta-data android:name="flutterEmbedding" android:value="2" />
                  <provider
                      android:name="androidx.core.content.FileProvider"
                      android:authorities="${applicationId}.fileprovider"
                      android:exported="false"
                      android:grantUriPermissions="true">
                      <meta-data
                          android:name="android.support.FILE_PROVIDER_PATHS"
                          android:resource="@xml/file_paths" />
                  </provider>
              </application>
          </manifest>
          MANIFEST

      - name: Write file_paths.xml for FileProvider (needed by share_plus)
        shell: bash
        run: |
          mkdir -p android/app/src/main/res/xml
          cat > android/app/src/main/res/xml/file_paths.xml <<'XML'
          <?xml version="1.0" encoding="utf-8"?>
          <paths>
              <cache-path name="cache" path="." />
              <external-cache-path name="external_cache" path="." />
              <files-path name="files" path="." />
          </paths>
          XML

      - name: Analyze
        run: |
          rm -rf test
          flutter analyze --no-fatal-infos --no-fatal-warnings

      - name: Build release APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Copy APK to repository folder
        run: |
          mkdir -p apk
          cp build/app/outputs/flutter-apk/app-release.apk apk/jamiyati.apk
          APK_URL="https://github.com/${GITHUB_REPOSITORY}/raw/${GITHUB_REF_NAME}/apk/jamiyati.apk"
          cat > DOWNLOAD_APK.md <<EOF
          # رابط تحميل التطبيق

          حمّل APK مباشرة:

          ${APK_URL}
          EOF
          {
            echo "## رابط تحميل APK"
            echo ""
            echo "${APK_URL}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Commit APK
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apk/jamiyati.apk DOWNLOAD_APK.md
          if git diff --cached --quiet; then
            echo "APK already up to date"
          else
            git commit -m "ci: update APK build"
            git push
          fi
